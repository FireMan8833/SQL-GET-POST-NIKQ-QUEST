    <path d="M0 648h1200"/>
    <path d="M0 698h1200"/>
    <path d="M114 720 450 420"/>
    <path d="M324 720 522 420"/>
    <path d="M876 720 678 420"/>
    <path d="M1086 720 750 420"/>
    <path d="M600 720V420"/>
  </g>
  <g transform="translate(600 306)" filter="url(#glow)">
    <circle r="142" fill="#03111b" stroke="#27ffd2" stroke-width="6"/>
    <circle r="102" fill="none" stroke="#1c8cff" stroke-width="18" stroke-dasharray="30 18"/>
    <circle r="62" fill="#fff36c" fill-opacity=".16" stroke="#fff36c" stroke-width="8"/>
    <path d="M-36-10 0-54 40-8 10 54Z" fill="#2cffd0"/>
    <path d="M-170 0h-116m456 0h116M0-170v-100M0 170v100" stroke="#fff36c" stroke-width="9" stroke-linecap="round"/>
  </g>
  <g opacity=".7">
