    <rect x="194" y="452" width="118" height="220" rx="12" fill="#061a28"/>
    <rect x="338" y="512" width="78" height="160" rx="10" fill="#04121c"/>
    <rect x="784" y="502" width="92" height="170" rx="10" fill="#04121c"/>
    <rect x="900" y="442" width="132" height="230" rx="12" fill="#061a28"/>
    <rect x="1056" y="526" width="76" height="146" rx="10" fill="#051521"/>
  </g>
  <g fill="#2cffd0" opacity=".82">
    <rect x="116" y="526" width="18" height="8"/>
    <rect x="228" y="488" width="22" height="8"/>
    <rect x="264" y="536" width="22" height="8"/>
    <rect x="930" y="486" width="24" height="8"/>
    <rect x="972" y="552" width="24" height="8"/>
