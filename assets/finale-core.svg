<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Final cyber core</title>
  <desc id="desc">A restored neon data core above a futuristic city grid.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#02070d"/>
      <stop offset=".5" stop-color="#06233a"/>
      <stop offset="1" stop-color="#03130f"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="43%" r="42%">
      <stop offset="0" stop-color="#fff36c"/>
      <stop offset=".18" stop-color="#2cffd0"/>
      <stop offset=".48" stop-color="#1c8cff" stop-opacity=".72"/>
      <stop offset="1" stop-color="#05111d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#sky)"/>
  <rect y="0" width="1200" height="720" fill="url(#core)"/>
  <g opacity=".32" stroke="#23ffd1" stroke-width="2">
